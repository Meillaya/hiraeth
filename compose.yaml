services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54320:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

  scrapling-sidecar:
    build:
      context: sidecar/
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - scrapling_cache:/app/.scrapling_cache
    mem_limit: 2g
    restart: unless-stopped

volumes:
  postgres-data:
  scrapling_cache:

